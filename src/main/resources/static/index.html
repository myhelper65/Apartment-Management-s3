        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const translations = {

        en: {

            aptNoPlaceholder: "Apt Name/No (e.g., A2, Shop 1)",
            addBtn: "Add",
            noItems: "No repairs/invoices recorded",
            detailsAndOrder: "Details & Add Record →",
            workOrders: "Work Orders",

            updateOrder: "Update Work Order",

            siteNamePlaceholder: "New Site Name...",
            confirmDelComm: "Are you sure you want to delete this community and ALL its apartments?",
            confirmDelApt: "Are you sure you want to delete this apartment and ALL its work orders?",
            confirmDelItem: "Are you sure you want to delete this work order and its S3 files?",
            delError: "Failed to delete. Check server connection.",
            category: "Category",
            jobTitle: "Repair / Item Bought",
            price: "Price ($)",
            dateTime: "Date & Time",

            catAppliance: "Appliance (Fridge, etc.)",
            catPlumbing: "Plumbing",
            catElectrical: "Electrical",
            catFlooring: "Floor Repair",
            catHVAC: "HVAC / AC",
            catOther: "Other",
            descPlaceholder: "Describe the issue or required work here...",
            attachments: "Attachments",
            uploadFile: "Upload File",
            scanDoc: "Scan Document",
            notes: "Notes & Description",
            maxFileLimitMsg: "You can upload a maximum of 6 files.",
            maxSizeLimitMsg: "Each file must be less than 15MB.",
            fileLimitsInfo: "Max 6 Files • 15MB each (PDF, PNG, MP4)",
            activeUnitsTitle: "Active Units Dashboard",
            activeUnitsSub: "Overview of all units with active records across all sites.",
            searchActiveUnits: "Search table for unit or site...",
            communityHeader: "Community",
            unitHeader: "Unit",
            recordsHeader: "Records",
            goToApt: "Go →"
        }
    };

    const Icons = {
        Layout: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1" /><rect width="7" height="5" x="14" y="3" rx="1" /><rect width="7" height="9" x="14" y="12" rx="1" /><rect width="7" height="5" x="3" y="16" rx="1" /></svg>,
        Search: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></svg>,
        Home: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,
        Plus: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><path d="M8 12h8" /><path d="M12 8v8" /></svg>,
        Image: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2" /><circle cx="9" cy="9" r="2" /><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" /></svg>,
        File: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /></svg>,
        Video: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect width="15" height="14" x="1" y="5" rx="2" ry="2"/></svg>,
        Lock: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>,
        Camera: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
        ArrowLeft: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
        Trash: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /></svg>,
        Edit: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>
    };

    const MAX_FILES = 6;
    const MAX_FILE_SIZE_MB = 15;
    const MAX_FILE_SIZE_BYTES = MAX_FILE_SIZE_MB * 1024 * 1024;

    const App = () => {
        const [lang, setLang] = useState(() => {
            const savedLang = localStorage.getItem('appLanguage');
            if (savedLang) return savedLang;
            const browserLang = navigator.language || navigator.userLanguage;
            return (browserLang && browserLang.startsWith('tr')) ? 'tr' : 'en';
        });

        const t = (key) => translations[lang][key] || key;
        const changeLanguage = (newLang) => { setLang(newLang); localStorage.setItem('appLanguage', newLang); };

        const [currentUser, setCurrentUser] = useState(() => {
            const savedUser = sessionStorage.getItem('activeUser');
            return savedUser ? JSON.parse(savedUser) : null;
        });

        const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('isAuthSession') === 'true');
        const [communities, setCommunities] = useState([]);
        const [selectedCommunityId, setSelectedCommunityId] = useState(null);
        const [selectedApartmentId, setSelectedApartmentId] = useState(null);

        const [newCommunityName, setNewCommunityName] = useState('');
        const [newAptName, setNewAptName] = useState('');

        // Search states
        const [searchTerm, setSearchTerm] = useState(''); // Sidebar search
        const [dashboardSearch, setDashboardSearch] = useState(''); // New Dashboard search

        const [showCameraModal, setShowCameraModal] = useState(false);
        const [cameraStream, setCameraStream] = useState(null);
        const videoRef = useRef(null);

        const [workOrderCategory, setWorkOrderCategory] = useState("General Maintenance");
        const [workOrderTitle, setWorkOrderTitle] = useState("");
        const [workOrderPrice, setWorkOrderPrice] = useState("");
        const [workOrderDate, setWorkOrderDate] = useState("");
        const [workOrderNotes, setWorkOrderNotes] = useState("");
        const [workOrderStatus, setWorkOrderStatus] = useState("Todo");

        const [uploadedFiles, setUploadedFiles] = useState([]);
        const [previewFile, setPreviewFile] = useState(null);
        const [editingItemId, setEditingItemId] = useState(null);

        // URL içindeki problemli karakterleri Tomcat için güvenli hale getirir
        const getSafeUrl = (url) => {
            if (!url || typeof url !== 'string') return url;
            if (url.includes('?key=')) {
                const parts = url.split('?key=');
                return parts[0] + '?key=' + encodeURIComponent(parts[1]);
            }
            return url;
        };
        useEffect(() => {
            if (selectedApartmentId) {
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                setWorkOrderDate(now.toISOString().slice(0, 16));
            }
        }, [selectedApartmentId]);

        useEffect(() => {
            fetch('/api/auth/me')
                .then(res => res.json())
                .then(data => {
                    if (data.isAuthenticated) {
                        setIsAuthenticated(true);
                        setCurrentUser({
                            name: data.name,
                            email: data.email,
                            picture: data.picture
                        });
                    } else {
                        setIsAuthenticated(false);
                    }
                })
            .catch(err => setIsAuthenticated(false));
        }, []);

        useEffect(() => {
            if (isAuthenticated) {
                fetch('/api/communities')
                    .then(res => {
                        if (!res.ok) throw new Error("Failed to fetch data");
                        return res.json();
                    })
                    .then(data => setCommunities(data || []))
                    .catch(err => console.error("Error loading portfolio:", err));
            }
        }, [isAuthenticated]);

        const handleGoogleLogin = () => window.location.href = '/oauth2/authorization/google';

        const handleLogout = () => {
            setIsAuthenticated(false);
            setCurrentUser(null);
            sessionStorage.removeItem('isAuthSession');
            sessionStorage.removeItem('activeUser');
            stopCamera();
            window.location.href = '/logout';
        };

        const handleAddCommunity = (e) => {
            e.preventDefault();
            const name = newCommunityName.trim();
            if (!name) return;
            fetch('/api/communities', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, apartments: [] })
            }).then(res => res.json()).then(savedComm => {
                setCommunities(prev => [...prev, savedComm]);
                setNewCommunityName('');
                setSelectedCommunityId(savedComm.id);
                setSelectedApartmentId(null);
            }).catch(err => alert("Error adding site."));
        };

        const handleAddApartment = (e) => {
            e.preventDefault();
            const name = newAptName.trim();
            if (!name || !selectedCommunityId) return;

            const community = communities.find(c => c.id === selectedCommunityId);
            if (community && community.apartments && community.apartments.some(a => a.id.toLowerCase() === name.toLowerCase())) {
                alert(lang === 'tr' ? "Bu isimde bir ünite zaten kayıtlı!" : "A unit with this name is already registered!");
                return;
            }

            fetch(`/api/communities/${selectedCommunityId}/apartments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: name, items: [] })
            }).then(res => {
                if (!res.ok) throw new Error("Duplicate");
                return res.json();
            }).then(savedApt => {
                setCommunities(prev => prev.map(c => c.id === selectedCommunityId ? { ...c, apartments: [...(c.apartments || []), savedApt] } : c));
                setNewAptName('');
            }).catch(err => alert(lang === 'tr' ? "Bu isimde bir ünite zaten sistemde mevcut." : "A unit with this name already exists in the system."));
        };

        const deleteCommunity = async (e, id) => {
            e.stopPropagation();
            if (window.confirm(t('confirmDelComm'))) {
                try {
                    const res = await fetch(`/api/communities/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        setCommunities(prev => prev.filter(c => c.id !== id));
                        if (selectedCommunityId === id) { setSelectedCommunityId(null); setSelectedApartmentId(null); }
                    } else throw new Error('Delete failed');
                } catch (err) { alert(t('delError')); }
            }
        };

        const deleteApartment = async (e, communityId, aptId) => {
            e.stopPropagation();
            if (window.confirm(t('confirmDelApt'))) {
                try {
                    const res = await fetch(`/api/apartments/${aptId}`, { method: 'DELETE' });
                    if (res.ok) {
                        setCommunities(prev => prev.map(c => {
                            if (c.id === communityId) return { ...c, apartments: (c.apartments || []).filter(a => a.id !== aptId) };
                            return c;
                        }));
                        if (selectedApartmentId === aptId) setSelectedApartmentId(null);
                    } else throw new Error('Delete failed');
                } catch (err) { alert(t('delError')); }
            }
        };

        const deleteItem = async (e, communityId, aptId, itemId) => {
            e.stopPropagation();
            if (window.confirm(t('confirmDelItem'))) {
                try {
                    const res = await fetch(`/api/items/${itemId}`, { method: 'DELETE' });
                    if (res.ok) {
                        setCommunities(prev => prev.map(c => {
                            if (c.id === communityId) {
                                return {
                                    ...c,
                                    apartments: (c.apartments || []).map(a => {
                                        if (a.id === aptId) return { ...a, items: (a.items || []).filter(i => i.id !== itemId) };
                                        return a;
                                    })
                                };
                            }
                            return c;
                        }));
                    } else throw new Error('Delete failed');
                } catch (err) { alert(t('delError')); }
            }
        };

        const handleFileChange = (e) => {
            const files = Array.from(e.target.files);
            const validSizeFiles = files.filter(file => file.size <= MAX_FILE_SIZE_BYTES);
            if (validSizeFiles.length < files.length) alert(t('maxSizeLimitMsg'));

            setUploadedFiles(prev => {
                const availableSlots = MAX_FILES - prev.length;
                if (availableSlots <= 0) { alert(t('maxFileLimitMsg')); return prev; }
                const allowedFiles = validSizeFiles.slice(0, availableSlots);
                if (validSizeFiles.length > availableSlots) alert(t('maxFileLimitMsg'));

                const mappedFiles = allowedFiles.map(file => ({
                    id: Math.random().toString(36).substr(2, 9),
                    name: file.name,
                    type: file.type || file.name.split('.').pop(),
                    size: (file.size / (1024 * 1024)).toFixed(2) + ' MB',
                    url: URL.createObjectURL(file),
                    rawFile: file
                }));
                return [...prev, ...mappedFiles];
            });
            e.target.value = null;
        };

        const handleAddScannedPhoto = (file, dataUrl) => {
            if (file.size > MAX_FILE_SIZE_BYTES) { alert(t('maxSizeLimitMsg')); return; }
            setUploadedFiles(prev => {
                if (prev.length >= MAX_FILES) { alert(t('maxFileLimitMsg')); return prev; }
                return [...prev, {
                    id: Math.random().toString(36).substr(2, 9),
                    name: file.name,
                    type: file.type,
                    size: (file.size / (1024 * 1024)).toFixed(2) + ' MB',
                    url: dataUrl,
                    rawFile: file
                }];
            });
        };

        const removeFile = (id) => setUploadedFiles(prev => prev.filter(f => f.id !== id));

        const startCamera = async () => {
            try {
                setShowCameraModal(true);
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
                setCameraStream(stream);
            } catch (err) {
                setShowCameraModal(false);
                document.getElementById('hidden-fallback-scan').click();
            }
        };

        const stopCamera = () => {
            if (cameraStream) { cameraStream.getTracks().forEach(track => track.stop()); setCameraStream(null); }
            setShowCameraModal(false);
        };

        const capturePhoto = () => {
            if (videoRef.current) {
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth || 640;
                canvas.height = videoRef.current.videoHeight || 480;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/png');
                canvas.toBlob((blob) => {
                    const file = new File([blob], `Scan_${Date.now()}.png`, { type: "image/png" });
                    handleAddScannedPhoto(file, dataUrl);
                }, 'image/png');
                stopCamera();
            }
        };

        const startEdit = (item) => {
            setEditingItemId(item.id);
            setWorkOrderCategory(item.category || "General Maintenance");
            setWorkOrderTitle(item.title);
            setWorkOrderPrice(item.price);
            setWorkOrderNotes(item.notes || "");
            setWorkOrderStatus(item.status || "Todo");

            if (item.date) {
                const d = new Date(item.date);
                d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
                setWorkOrderDate(d.toISOString().slice(0, 16));
            }

            const preExistingFiles = [];
            if (item.productImageUrl || item.productImage) {
                const url = item.productImageUrl || item.productImage;
                preExistingFiles.push({ id: 'pre-prod-' + item.id, name: url.split('/').pop() || 'Product Image', type: 'image/*', url: url, isPreExisting: true });
            }
            if (item.invoiceImageUrl || item.invoiceImage) {
                const url = item.invoiceImageUrl || item.invoiceImage;
                preExistingFiles.push({ id: 'pre-inv-' + item.id, name: url.split('/').pop() || 'Invoice Image', type: 'image/*', url: url, isPreExisting: true });
            }
            if (item.attachments && Array.isArray(item.attachments)) {
                item.attachments.forEach((att, idx) => {
                    const url = typeof att === 'string' ? att : att.url;
                    preExistingFiles.push({
                        id: `pre-att-${item.id}-${idx}`,
                        name: url.split('/').pop() || `Document ${idx + 1}`,
                        type: url.toLowerCase().includes('.pdf') ? 'application/pdf' : url.toLowerCase().includes('.mp4') ? 'video/mp4' : 'image/*',
                        url: url,
                        isPreExisting: true
                    });
                });
            }
            setUploadedFiles(preExistingFiles.slice(0, MAX_FILES));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const saveItem = async () => {
            const safeTitle = workOrderTitle != null ? workOrderTitle.toString().trim() : "";
            const safePrice = workOrderPrice != null ? workOrderPrice.toString().trim() : "";

            if (safeTitle === "" || safePrice === "" || !selectedApartmentId) {
                alert(lang === 'tr' ? "Lütfen bir başlık ve fiyat girin." : "Please enter a title and price.");
                return;
            }

            try {
                const formData = new FormData();
                formData.append("title", safeTitle);
                formData.append("price", safePrice);
                formData.append("notes", workOrderNotes || "");
                formData.append("status", workOrderStatus || "Todo");
                formData.append("date", workOrderDate || "");
                formData.append("category", workOrderCategory || "General Maintenance");

                const newFiles = uploadedFiles.filter(f => f.rawFile).map(f => f.rawFile);
                newFiles.forEach(file => { formData.append("attachments", file); });

                const existingFilesToKeep = uploadedFiles.filter(f => f.isPreExisting).map(f => f.url);
                existingFilesToKeep.forEach(url => { formData.append("retainedAttachments", url); });

                const url = editingItemId ? `/api/items/${editingItemId}` : `/api/apartments/${selectedApartmentId}/items`;
                const method = editingItemId ? 'PUT' : 'POST';

                const response = await fetch(url, { method: method, body: formData });
                if (!response.ok) throw new Error("Save operation failed.");
                const savedItem = await response.json();

                setCommunities(prev => prev.map(c => {
                    if (c.id === selectedCommunityId) {
                        return { ...c, apartments: c.apartments.map(a => {
                            if (a.id === selectedApartmentId) {
                                const existingItems = a.items || [];
                                const updatedItems = editingItemId
                                    ? existingItems.map(i => i.id === editingItemId ? savedItem : i)
                                    : [savedItem, ...existingItems];
                                return { ...a, items: updatedItems };
                            }
                            return a;
                        })};
                    }
                    return c;
                }));

                setEditingItemId(null);
                setWorkOrderTitle("");
                setWorkOrderPrice("");
                setWorkOrderNotes("");
                setUploadedFiles([]);
                setWorkOrderStatus("Todo");

            } catch (err) {

                                                                    </button>
                                                                </div>
                                                            </div>

                                                            <span className="text-sm font-bold text-slate-500 block">
                                                                {item.date ? new Date(item.date).toLocaleString(lang === 'tr' ? 'tr-TR' : 'en-US', { dateStyle: 'long', timeStyle: 'short' }) : ''}
                                                            </span>

                                                            {item.notes && <p className="text-[15px] text-slate-700 font-medium whitespace-pre-wrap bg-slate-50 p-5 rounded-2xl border-2 border-slate-100 leading-relaxed shadow-inner">{item.notes}</p>}

                                                            {allAttachments.length > 0 && (
                                                                <div className="pt-4 mt-2">
                                                                    <h4 className="text-xs font-black text-slate-500 uppercase tracking-widest mb-3">{t('attachments')} ({allAttachments.length})</h4>
                                                                    <div className="flex flex-wrap gap-3">
                                                                        {allAttachments.map((att, idx) => {
                                                                            const urlLower = att.url ? att.url.toLowerCase() : '';
                                                                            const isPdf = urlLower.includes('.pdf');
                                                                            const isVideo = urlLower.includes('.mp4') || urlLower.includes('.mov');
                                                                            return (
                                                                                <button key={idx} onClick={() => setPreviewFile(att.url)} className="flex items-center gap-2 px-4 py-2.5 bg-white border-2 border-slate-200 rounded-xl hover:border-indigo-400 hover:bg-indigo-50 hover:text-indigo-700 text-slate-700 text-sm font-bold transition-all shadow-sm group">
                                                                                    {isVideo ? <Icons.Video size={16} className="text-indigo-500 group-hover:text-indigo-700"/> : isPdf ? <Icons.File size={16} className="text-rose-500 group-hover:text-rose-600"/> : <Icons.Image size={16} className="text-emerald-500 group-hover:text-emerald-600"/>}
                                                                                    <span className="truncate max-w-[120px]">{att.name}</span>
                                                                                </button>
                                                                            );
                                                                        })}
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>

                                    {/* WORK ORDER FORM */}
                                    <div className={`xl:col-span-5 bg-white border-2 rounded-[2.5rem] p-8 shadow-xl transition-all duration-300 sticky top-28 ${editingItemId ? 'border-indigo-500 ring-4 ring-indigo-500/20' : 'border-slate-200'}`}>
                                        <h3 className={`text-2xl font-black flex items-center gap-3 mb-8 ${editingItemId ? 'text-indigo-700' : 'text-slate-900'}`}>
                                            {editingItemId ? <Icons.Edit size={24}/> : <Icons.Plus size={24} className="text-indigo-600"/>}
                                            {editingItemId ? t('updateOrder') : t('saveOrder')}
                                        </h3>

                                        <div className="space-y-6">
                                            <div>
                                                <label className="text-xs font-black uppercase text-slate-600 tracking-widest block mb-2">{t('category')}</label>
                                                <select className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none text-[15px] font-bold focus:border-indigo-500 focus:bg-white text-slate-900 transition-all shadow-sm" value={workOrderCategory} onChange={e => setWorkOrderCategory(e.target.value)}>
                                                    <option value="General Maintenance">{t('catGeneral')}</option>
                                                    <option value="Appliance (Fridge, etc.)">{t('catAppliance')}</option>
                                                    <option value="Plumbing">{t('catPlumbing')}</option>
                                                    <option value="Electrical">{t('catElectrical')}</option>
                                                    <option value="Floor Repair">{t('catFlooring')}</option>
                                                    <option value="HVAC / AC">{t('catHVAC')}</option>
                                                    <option value="Other">{t('catOther')}</option>
                                                </select>
                                            </div>

                                            <div>
                                                <label className="text-xs font-black uppercase text-slate-600 tracking-widest block mb-2">{t('jobTitle')}</label>
                                                <input type="text" className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none text-[15px] font-bold focus:border-indigo-500 focus:bg-white text-slate-900 transition-all shadow-sm placeholder-slate-400" placeholder="Example: Sink repair, New Fridge..." value={workOrderTitle} onChange={e => setWorkOrderTitle(e.target.value)} />
                                            </div>

                                            <div className="grid grid-cols-2 gap-5">
                                                <div>
                                                    <label className="text-xs font-black uppercase text-slate-600 tracking-widest block mb-2">{t('price')}</label>
                                                    <input type="number" step="any" className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none text-lg font-black focus:border-indigo-500 focus:bg-white text-emerald-700 transition-all shadow-sm placeholder-slate-300" placeholder="0.00" value={workOrderPrice} onChange={e => setWorkOrderPrice(e.target.value)} />
                                                </div>
                                                <div>
                                                    <label className="text-xs font-black uppercase text-slate-600 tracking-widest block mb-2">{t('dateTime')}</label>
                                                    <input type="datetime-local" className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none text-[15px] font-bold focus:border-indigo-500 focus:bg-white text-slate-900 transition-all shadow-sm" value={workOrderDate} onChange={e => setWorkOrderDate(e.target.value)} />
                                                </div>
                                            </div>

                                            <div>
                                                <label className="text-xs font-black uppercase text-slate-600 tracking-widest block mb-2">Durum / Status</label>
                                                <select className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none text-[15px] font-bold focus:border-indigo-500 focus:bg-white text-slate-900 transition-all shadow-sm" value={workOrderStatus} onChange={e => setWorkOrderStatus(e.target.value)}>
                                                    <option value="Todo">{t('todo')}</option>
                                                    <option value="InProgress">{t('inProgress')}</option>
                                                    <option value="Complete">{t('complete')}</option>
                                                </select>
                                            </div>

                                            <div>
                                                <label className="text-xs font-black uppercase text-slate-600 tracking-widest block mb-2">{t('notes')}</label>
                                                <textarea className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none text-[15px] font-semibold resize-none h-28 focus:border-indigo-500 focus:bg-white text-slate-900 transition-all shadow-sm placeholder-slate-400" placeholder={t('descPlaceholder')} value={workOrderNotes} onChange={e => setWorkOrderNotes(e.target.value)} />
                                            </div>

                                            <div className="space-y-4 pt-4 border-t-2 border-slate-100">
                                                <div className="flex justify-between items-end mb-2">
                                                    <div>
                                                        <label className="text-sm font-black uppercase text-slate-800 tracking-widest block">{t('attachments')}</label>
                                                        <p className="text-xs text-slate-500 font-bold mt-1">{t('fileLimitsInfo')}</p>
                                                    </div>
                                                    <span className={`text-xs font-black px-3 py-1.5 rounded-lg border-2 ${uploadedFiles.length >= MAX_FILES ? 'bg-rose-100 text-rose-800 border-rose-200' : 'bg-slate-100 text-slate-700 border-slate-200'}`}>
                                                        {uploadedFiles.length} / {MAX_FILES}
                                                    </span>
                                                </div>

                                                <div className="grid grid-cols-2 gap-4">
                                                    <button type="button" disabled={uploadedFiles.length >= MAX_FILES} onClick={() => document.getElementById('workorder-file-input').click()} className="flex flex-col items-center justify-center gap-3 border-2 border-dashed border-slate-300 hover:border-indigo-500 bg-slate-50 hover:bg-indigo-50 py-6 rounded-2xl text-[15px] font-black text-slate-600 hover:text-indigo-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                                        <div className="bg-white p-3 rounded-full shadow-sm border border-slate-200"><Icons.File size={24} className="text-indigo-500"/></div>
                                                        {t('uploadFile')}
                                                    </button>
                                                    <button type="button" disabled={uploadedFiles.length >= MAX_FILES} onClick={startCamera} className="flex flex-col items-center justify-center gap-3 border-2 border-dashed border-slate-300 hover:border-indigo-500 bg-slate-50 hover:bg-indigo-50 py-6 rounded-2xl text-[15px] font-black text-slate-600 hover:text-indigo-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                                        <div className="bg-white p-3 rounded-full shadow-sm border border-slate-200"><Icons.Camera size={24} className="text-emerald-500"/></div>
                                                        {t('scanDoc')}
                                                    </button>
                                                </div>
                                                <input id="workorder-file-input" type="file" multiple accept="image/*,application/pdf,video/mp4" className="hidden" onChange={handleFileChange} />
                                                <input id="hidden-fallback-scan" type="file" accept="image/*" capture="environment" className="hidden" onChange={handleFileChange} />
                                            </div>

                                            {uploadedFiles.length > 0 && (
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-4">
                                                    {uploadedFiles.map(file => {
                                                        const isVideo = file.type?.includes('video') || (file.url && file.url.toLowerCase().includes('.mp4'));
                                                        const isPdf = file.type?.includes('pdf') || (file.url && file.url.toLowerCase().includes('.pdf'));
                                                        return (
                                                            <div key={file.id} className="relative group bg-white border-2 border-slate-200 rounded-2xl p-2 flex items-center gap-3 shadow-sm hover:border-indigo-400 transition-colors">
                                                                <div className="w-14 h-14 rounded-xl bg-slate-100 border border-slate-200 overflow-hidden shrink-0 flex items-center justify-center cursor-pointer" onClick={() => setPreviewFile(file.url)}>
                                                                    {(file.rawFile && file.type?.startsWith('image/')) || (file.isPreExisting && !isPdf && !isVideo) ? (
                                                                        <img src={getSafeUrl(file.url)} className="w-full h-full object-cover group-hover:scale-110 transition-transform" />
                                                                    ) : isVideo ? (
                                                                        <Icons.Video size={24} className="text-indigo-500" />
                                                                    ) : (
                                                                        <Icons.File size={24} className="text-rose-500" />
                                                                    )}
                                                                </div>
                                                                <div className="min-w-0 flex-1 pr-8 cursor-pointer" onClick={() => setPreviewFile(file.url)}>
                                                                    <p className="text-sm font-black text-slate-800 truncate">{file.name}</p>
                                                                    <p className="text-xs text-slate-500 font-bold">{file.size || 'Server File'}</p>
                                                                </div>
                                                                <button type="button" onClick={() => removeFile(file.id)} className="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center text-slate-400 hover:text-white bg-slate-50 hover:bg-rose-500 rounded-lg transition-all border border-slate-200 hover:border-rose-500">
                                                                    ✕
                                                                </button>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            )}

                                            <div className="flex gap-4 pt-6 border-t-2 border-slate-100">
                                                {editingItemId && (
                                                    <button type="button" onClick={() => { setEditingItemId(null); setWorkOrderTitle(""); setWorkOrderPrice(""); setWorkOrderNotes(""); setUploadedFiles([]); }} className="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-800 font-black py-4 rounded-xl uppercase text-sm tracking-widest transition-colors border-2 border-slate-200 shadow-sm">
                                                        {t('cancelEdit')}
                                                    </button>
                                                )}
                                                <button type="button" onClick={saveItem} className={`flex-1 font-black py-4 rounded-xl uppercase text-sm tracking-widest shadow-xl transition-all text-white ${editingItemId ? 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-500/40' : 'bg-slate-900 hover:bg-black shadow-slate-900/30'}`}>
                                                    {editingItemId ? t('updateOrder') : t('saveOrder')}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>

                {showCameraModal && (
                    <div className="fixed inset-0 glass-panel flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-[2.5rem] max-w-lg w-full overflow-hidden shadow-2xl border-2 border-slate-200 animate-in">
                            <div className="p-6 border-b-2 border-slate-100 flex justify-between items-center bg-slate-50">
                                <div><h3 className="font-black text-slate-900 text-xl flex items-center gap-3"><Icons.Camera size={22} className="text-indigo-600" /> {t('documentScanner')}</h3></div>
                                <button onClick={stopCamera} className="text-slate-500 w-10 h-10 bg-white border-2 border-slate-200 rounded-full flex items-center justify-center font-bold hover:bg-rose-500 hover:text-white hover:border-rose-500 transition-all shadow-sm">✕</button>
                            </div>
                            <div className="bg-black relative aspect-[4/3] flex items-center justify-center">
                                <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover"></video>
                            </div>
                            <div className="p-6 bg-slate-50 flex gap-4 justify-end border-t-2 border-slate-100">
                                <button type="button" onClick={stopCamera} className="px-6 py-3.5 rounded-xl border-2 border-slate-200 bg-white text-slate-700 text-sm font-black uppercase hover:bg-slate-100 transition-colors shadow-sm">{t('cancel')}</button>
                                <button type="button" onClick={capturePhoto} className="px-8 py-3.5 rounded-xl bg-indigo-600 text-white text-sm font-black uppercase shadow-lg shadow-indigo-500/30 hover:bg-indigo-700 transition-colors">{t('takePhoto')}</button>
                            </div>
                        </div>
                    </div>
                )}

                {previewFile && (() => {
                    const rawUrl = typeof previewFile === 'string' ? previewFile : previewFile.url;
                    const previewUrl = getSafeUrl(rawUrl);
                    const urlLower = previewUrl ? previewUrl.toLowerCase() : '';
                    const isPdf = urlLower.includes('.pdf');
                    const isVideo = urlLower.includes('.mp4') || urlLower.includes('.mov');

                    return (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-xl flex items-center justify-center z-[100] p-4 sm:p-8 animate-in" onClick={() => setPreviewFile(null)}>
                            <div className="relative bg-slate-800 rounded-[2rem] max-w-6xl w-full h-[90vh] p-3 overflow-hidden shadow-[0_0_50px_-12px_rgba(0,0,0,0.5)] border border-slate-700 flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center px-4 py-3 border-b border-slate-700 mb-2">
                                    <h3 className="text-white font-bold tracking-widest uppercase text-sm flex items-center gap-2">
                                        {isPdf ? <Icons.File size={16}/> : isVideo ? <Icons.Video size={16}/> : <Icons.Image size={16}/>}
                                        {isPdf ? 'PDF Belgesi' : isVideo ? 'Video Kaydı' : 'Görsel Önizleme'}
                                    </h3>
                                    <button onClick={() => setPreviewFile(null)} className="bg-slate-700 hover:bg-rose-500 text-white font-bold w-10 h-10 rounded-full flex items-center justify-center transition-all shadow-lg">✕</button>
                                </div>

                                <div className="w-full flex-1 overflow-hidden flex items-center justify-center bg-slate-900 rounded-2xl">
                                    {isPdf ? (
                                        <iframe src={previewUrl} className="w-full h-full rounded-xl" frameBorder="0"></iframe>
                                    ) : isVideo ? (
                                        <video controls autoPlay src={previewUrl} className="max-w-full max-h-full rounded-xl shadow-2xl bg-black outline-none"></video>
                                    ) : (
                                        <img src={previewUrl} className="max-w-full max-h-full object-contain rounded-xl shadow-2xl" alt="Preview Attachment" />
                                    )}
                                </div>
                            </div>
                        </div>
                    );
                })()}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render((<App />));
</script>
</body>
</html>
