server {
    # Listen on port 443 for secure HTTPS traffic
    listen 443 ssl;
    server_name abc.xyz; # Your production domain

    # SSL Certificate locations (managed by Let's Encrypt / Certbot usually)
    ssl_certificate /etc/letsencrypt/live/abc.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abc.xyz/privkey.pem;

    # 1. SERVE THE REACT FRONTEND
    location / {
        # Path to your built React files (e.g., the contents of your 'dist' folder)
        root /var/www/abc.xyz/html;
        index index.html;

        # Required for React Router to work correctly on page refresh
        try_files $uri $uri/ /index.html;
    }

    # 2. PROXY THE OAUTH2 LOGIN ENDPOINTS (YOUR SNIPPET)
    location /login {
        proxy_pass http://localhost:8080;

        # These headers are mandatory for OAuth2 behind a proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # Tells Spring the request was HTTPS
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # 3. PROXY THE OAUTH2 REDIRECT ENDPOINTS
    location /oauth2 {
        proxy_pass http://localhost:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # 4. PROXY THE REST API ENDPOINTS
    location /api {
        proxy_pass http://localhost:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

# Optional but recommended: Redirect all HTTP (port 80) traffic to HTTPS (port 443)
server {
    listen 80;
    server_name abc.xyz;
    return 301 https://$host$request_uri;
}