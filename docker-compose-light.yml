services:
  db:
    image: postgres:15-alpine
    container_name: apartment-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: apartment_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apartment_manager"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .   # İmajı otomatik oluşturması için bunu geri ekledik
    container_name: apartment-manager-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      AWS_REGION: us-east-1
      DB_PASSWORD: ${DB_PASSWORD}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      # --- S3 PREVIEW (ÖNİZLEME) İÇİN GEREKENLER ---
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_KEY}
      # ---------------------------------------------
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

volumes:
  postgres_data: