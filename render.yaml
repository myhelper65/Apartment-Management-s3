services:
  - type: web
    name: apartment-manager
    env: docker
    plan: free
    repo: https://github.com/myhelper65/Apartment-Management-s3.git
    branch: main
    startCommand: java $JAVA_OPTS -jar target/*.jar
    healthCheckPath: /
    envVars:
      - key: DB_HOST
        value: apartment-postgres
      - key: DB_PASSWORD
        fromDatabase:
          name: apartment-db
          property: password
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JAVA_OPTS
        value: "-Xms256m -Xmx512m -XX:+UseG1GC"

  - type: pserv
    name: apartment-db
    env: docker
    plan: free
    image:
      fromRegistry:
        url: docker.io/library/postgres:15-alpine
    envVars:
      - key: POSTGRES_DB
        value: apartment_manager
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        generateValue: true
    disk:
      name: postgres_data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
